<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e94560">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Calorie Tracker</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --text2: #999;
  --green: #4ecca3;
  --red: #e94560;
  --orange: #f5a623;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}

.header {
  padding: 16px;
  text-align: center;
  background: var(--card);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: sticky;
  top: 0;
  z-index: 10;
}

.header h1 { font-size: 18px; font-weight: 600; }

.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}

.date-nav button {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}

.date-nav span { font-size: 14px; color: var(--text2); }

.summary {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 16px;
}

.summary-card {
  background: var(--card);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.summary-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.summary-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

.progress-bar {
  margin: 0 16px 16px;
  height: 8px;
  background: var(--card);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar .fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s, background 0.3s;
}

.section {
  margin: 0 16px 16px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.section-header h2 { font-size: 16px; font-weight: 600; }

.add-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.entry-list { display: flex; flex-direction: column; gap: 6px; }

.entry {
  background: var(--card);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.entry .info { flex: 1; }
.entry .name { font-size: 14px; font-weight: 500; }
.entry .detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
.entry .cals { font-size: 16px; font-weight: 700; white-space: nowrap; margin-left: 12px; }
.entry .cals.food { color: var(--red); }
.entry .cals.exercise { color: var(--green); }

.entry .delete-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  margin-left: 8px;
}

.empty { color: var(--text2); font-size: 13px; text-align: center; padding: 20px; }

/* Measurements */
.measurements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.measure-card {
  background: var(--card);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
}

.measure-card .m-label { font-size: 11px; color: var(--text2); text-transform: uppercase; }
.measure-card .m-value { font-size: 20px; font-weight: 700; margin-top: 4px; }
.measure-card .m-unit { font-size: 11px; color: var(--text2); }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 10;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  padding: 4px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 24px; height: 24px; fill: currentColor; }

/* Pages */
.page { display: none; }
.page.active { display: block; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 500px;
  padding: 24px 16px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}

.modal h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  outline: none;
}

.form-group input:focus { border-color: var(--accent); }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.modal-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn-cancel { background: var(--bg); color: var(--text); }
.btn-save { background: var(--accent); color: #fff; }

/* Settings */
.setting-row {
  background: var(--card);
  border-radius: 10px;
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.setting-row label { font-size: 14px; }
.setting-row input {
  width: 100px;
  padding: 8px;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  text-align: right;
  outline: none;
}

/* History page */
.history-entry {
  background: var(--card);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
}

.history-entry .h-date { font-size: 13px; color: var(--accent); font-weight: 600; }
.history-entry .h-stats { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* Food search */
.search-wrap { position: relative; }

.search-results {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0 0 8px 8px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}

.search-results.show { display: block; }

.search-item {
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search-item:active, .search-item:hover { background: rgba(255,255,255,0.05); }
.search-item .s-name { font-size: 14px; flex: 1; }
.search-item .s-cal { font-size: 12px; color: var(--accent); white-space: nowrap; margin-left: 8px; }

.search-loading { padding: 10px 12px; color: var(--text2); font-size: 13px; text-align: center; }

.cal-preview {
  background: var(--bg);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
  font-size: 14px;
  color: var(--text2);
  margin-top: 8px;
}

.cal-preview strong { color: var(--accent); font-size: 18px; }

/* My Foods page */
.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 12px;
}
.tab-bar button {
  flex: 1;
  padding: 10px;
  background: var(--card);
  border: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.tab-bar button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

.food-item {
  background: var(--card);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.food-item .fi-info { flex: 1; }
.food-item .fi-name { font-size: 14px; font-weight: 500; }
.food-item .fi-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
.food-item .fi-actions { display: flex; gap: 4px; }
.food-item .fi-actions button {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 6px;
}

/* Recipe ingredient list in modal */
.ingredient-list { margin-bottom: 8px; }
.ingredient-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.ingredient-row .ir-name { flex: 1; }
.ingredient-row .ir-g { color: var(--text2); }
.ingredient-row .ir-cal { color: var(--accent); min-width: 60px; text-align: right; }
.ingredient-row .ir-del { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; }
.ingredient-total {
  padding: 8px 0;
  font-size: 13px;
  color: var(--text2);
  text-align: right;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Calorie Tracker</h1>
  <div class="date-nav" id="dateNav">
    <button onclick="changeDate(-1)">&larr;</button>
    <span id="dateLabel"></span>
    <button onclick="changeDate(1)">&rarr;</button>
  </div>
</div>

<!-- PAGE: TODAY -->
<div class="page active" id="pageToday">
  <div class="summary">
    <div class="summary-card">
      <div class="label">Eaten</div>
      <div class="value" id="sumEaten">0</div>
      <div class="sub">kcal</div>
    </div>
    <div class="summary-card">
      <div class="label">Burned</div>
      <div class="value" id="sumBurned" style="color:var(--green)">0</div>
      <div class="sub">kcal</div>
    </div>
    <div class="summary-card">
      <div class="label">Remaining</div>
      <div class="value" id="sumRemaining">0</div>
      <div class="sub">kcal</div>
    </div>
  </div>

  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

  <div class="section">
    <div class="section-header">
      <h2>Food</h2>
      <button class="add-btn" onclick="openModal('food')">+ Add</button>
    </div>
    <div class="entry-list" id="foodList"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Exercise</h2>
      <button class="add-btn" onclick="openModal('exercise')" style="background:var(--green)">+ Add</button>
    </div>
    <div class="entry-list" id="exerciseList"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Measurements</h2>
      <div>
        <button class="add-btn" onclick="openModal('weightLog')" style="background:var(--accent2);margin-right:6px">History</button>
        <button class="add-btn" onclick="openModal('measurements')" style="background:var(--accent2)">Log</button>
      </div>
    </div>
    <div class="measurements-grid" id="measureGrid">
      <div class="measure-card">
        <div class="m-label">Weight</div>
        <div class="m-value" id="mWeight">--</div>
        <div class="m-unit">kg</div>
      </div>
    </div>
  </div>
</div>

<!-- PAGE: HISTORY -->
<div class="page" id="pageHistory">
  <div class="section" style="margin-top:16px">
    <h2 style="margin-bottom:12px">History</h2>
    <div id="historyList"></div>
  </div>
</div>

<!-- PAGE: MY FOODS -->
<div class="page" id="pageMyFoods">
  <div class="section" style="margin-top:16px">
    <div class="tab-bar">
      <button class="active" onclick="switchMyFoodsTab('custom', this)">Custom Foods</button>
      <button onclick="switchMyFoodsTab('recipes', this)">Recipes</button>
    </div>

    <div id="tabCustom">
      <div class="section-header">
        <h2>Custom Foods</h2>
        <button class="add-btn" onclick="openModal('customFood')">+ Add</button>
      </div>
      <div id="customFoodList"></div>
    </div>

    <div id="tabRecipes" style="display:none">
      <div class="section-header">
        <h2>Recipes</h2>
        <button class="add-btn" onclick="openModal('recipe')">+ Add</button>
      </div>
      <div id="recipeList"></div>
    </div>
  </div>
</div>

<!-- PAGE: SETTINGS -->
<div class="page" id="pageSettings">
  <div class="section" style="margin-top:16px">
    <h2 style="margin-bottom:12px">Settings</h2>
    <div class="setting-row">
      <label>Daily calorie goal</label>
      <input type="number" id="goalInput" inputmode="numeric" placeholder="2000">
    </div>
    <div class="setting-row">
      <label>Units</label>
      <select id="unitSelect" style="width:100px;padding:8px;background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;">
        <option value="metric">Metric</option>
        <option value="imperial">Imperial</option>
      </select>
    </div>
    <button class="add-btn" style="width:100%;margin-top:12px;padding:12px;font-size:15px;" onclick="saveSettings()">Save Settings</button>
    <button class="add-btn" style="width:100%;margin-top:8px;padding:12px;font-size:15px;background:var(--accent2);" onclick="exportData()">Export Data (JSON)</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('pageToday', this)">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    Today
  </button>
  <button class="nav-btn" onclick="showPage('pageMyFoods', this)">
    <svg viewBox="0 0 24 24"><path d="M8.1 13.34l2.83-2.83L3.91 3.5a4.008 4.008 0 000 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/></svg>
    My Foods
  </button>
  <button class="nav-btn" onclick="showPage('pageHistory', this)">
    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    History
  </button>
  <button class="nav-btn" onclick="showPage('pageSettings', this)">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    Settings
  </button>
</div>

<!-- MODAL: ADD CUSTOM FOOD -->
<div class="modal-overlay" id="modalCustomFood">
  <div class="modal">
    <h3>Add Custom Food</h3>
    <div class="form-group">
      <label>Food name</label>
      <input type="text" id="cfName" placeholder="e.g. Mom's cookies">
    </div>
    <div class="form-group">
      <label>Calories per 100g</label>
      <input type="number" id="cfCal" inputmode="decimal" placeholder="e.g. 450">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalCustomFood')">Cancel</button>
      <button class="btn-save" onclick="saveCustomFood()">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD RECIPE -->
<div class="modal-overlay" id="modalRecipe">
  <div class="modal" style="max-height:85vh;display:flex;flex-direction:column;">
    <h3 id="recipeModalTitle">Add Recipe</h3>
    <div style="flex:1;overflow-y:auto;">
      <div class="form-group">
        <label>Recipe name</label>
        <input type="text" id="recipeName" placeholder="e.g. Chicken stir fry">
      </div>

      <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px;">Ingredients</label>
      <div class="ingredient-list" id="ingredientList"></div>
      <div id="ingredientTotal" class="ingredient-total"></div>

      <div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:14px;">
        <div class="form-group search-wrap" style="margin-bottom:8px;">
          <input type="text" id="ingSearch" placeholder="Search ingredient..." autocomplete="off" style="font-size:14px;">
          <div class="search-results" id="ingSearchResults"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <input type="number" id="ingWeight" inputmode="decimal" placeholder="Grams" style="flex:1;padding:8px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text);font-size:14px;">
          <button class="add-btn" style="font-size:13px;" onclick="addIngredient()">+ Add</button>
        </div>
      </div>

      <div class="form-group">
        <label>Total recipe weight after cooking (g)</label>
        <input type="number" id="recipeTotalWeight" inputmode="decimal" placeholder="e.g. 800">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalRecipe')">Cancel</button>
      <button class="btn-save" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- MODAL: WEIGHT LOG -->
<div class="modal-overlay" id="modalWeightLog">
  <div class="modal" style="max-height:70vh;display:flex;flex-direction:column;">
    <h3>Weight History</h3>
    <div class="tab-bar" style="margin-bottom:12px;">
      <button class="active" id="wTabDaily" onclick="switchWeightTab('daily')">Daily</button>
      <button id="wTabWeekly" onclick="switchWeightTab('weekly')">Weekly Avg</button>
    </div>
    <div id="weightLogList" style="flex:1;overflow-y:auto;"></div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn-cancel" onclick="closeModal('modalWeightLog')" style="flex:1">Close</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD FOOD -->
<div class="modal-overlay" id="modalFood">
  <div class="modal">
    <h3>Add Food</h3>
    <div class="form-group search-wrap">
      <label>Search food</label>
      <input type="text" id="foodName" placeholder="Type to search... e.g. chicken" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="form-group">
      <label>Weight (g)</label>
      <input type="number" id="foodWeight" inputmode="decimal" placeholder="e.g. 150">
    </div>
    <div id="calPreview" class="cal-preview" style="display:none">
      <strong id="previewCals">0</strong> kcal
    </div>
    <input type="hidden" id="foodCalsPer100" value="">
    <div class="form-group" id="manualCalGroup">
      <label>Or enter calories manually (kcal)</label>
      <input type="number" id="foodCals" inputmode="decimal" placeholder="e.g. 250">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalFood')">Cancel</button>
      <button class="btn-save" onclick="addFood()">Add</button>
    </div>

// ── State ──
let currentDate = new Date();
let selectedFood = null; // {name, calPer100}
let searchTimeout = null;
let settings = JSON.parse(localStorage.getItem('ct_settings') || '{"goal":2000,"units":"metric"}');

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getData(key) {
  return JSON.parse(localStorage.getItem('ct_' + key) || '{}');
}

function setData(key, val) {
  localStorage.setItem('ct_' + key, JSON.stringify(val));
}

function getDayData(d) {
  const key = dateKey(d || currentDate);
  const all = getData('days');
  return all[key] || { food: [], exercise: [], measurements: {} };
}

function setDayData(d, data) {
  const key = dateKey(d || currentDate);
  const all = getData('days');
  all[key] = data;
  setData('days', all);
}

// ── Date Navigation ──
function updateDateLabel() {
  const today = new Date();
  const dk = dateKey(currentDate);
  const tk = dateKey(today);
  let label = currentDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  if (dk === tk) label = 'Today';
  else if (dk === dateKey(new Date(today.getTime() - 86400000))) label = 'Yesterday';
  document.getElementById('dateLabel').textContent = label;
}

function changeDate(dir) {
  currentDate = new Date(currentDate.getTime() + dir * 86400000);
  updateDateLabel();
  render();
}

// ── Render ──
function render() {
  const day = getDayData();
  const goal = settings.goal || 2000;

  const eaten = day.food.reduce((s, f) => s + (f.cals || 0), 0);
  const burned = day.exercise.reduce((s, e) => s + (e.cals || 0), 0);
  const budget = goal + burned;
  const remaining = budget - eaten;

  document.getElementById('sumEaten').textContent = Math.round(eaten);
  document.getElementById('sumBurned').textContent = Math.round(burned);

  const remEl = document.getElementById('sumRemaining');
  remEl.textContent = Math.round(remaining);
  remEl.style.color = remaining >= 0 ? 'var(--green)' : 'var(--red)';

  const pct = Math.min((eaten / budget) * 100, 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.style.background = eaten > budget ? 'var(--red)' : eaten > budget * 0.85 ? 'var(--orange)' : 'var(--green)';

  // Food list
  const foodList = document.getElementById('foodList');
  if (day.food.length === 0) {
    foodList.innerHTML = '<div class="empty">No food logged yet</div>';
  } else {
    foodList.innerHTML = day.food.map((f, i) => `
      <div class="entry">
        <div class="info">
          <div class="name">${esc(f.name)}</div>
          <div class="detail">${f.weight ? f.weight + 'g' : ''}${f.calPer100 ? ' (' + f.calPer100 + ' kcal/100g)' : ''}</div>
        </div>
        <div class="cals food">${Math.round(f.cals)}</div>
        <button class="delete-btn" onclick="deleteFood(${i})">&times;</button>
      </div>
    `).join('');
  }

  // Exercise list
  const exList = document.getElementById('exerciseList');
  if (day.exercise.length === 0) {
    exList.innerHTML = '<div class="empty">No exercise logged yet</div>';
  } else {
    exList.innerHTML = day.exercise.map((e, i) => `
      <div class="entry">
        <div class="info">
          <div class="name">${esc(e.name)}</div>
          <div class="detail">${e.duration ? e.duration + ' min' : ''}</div>
        </div>
        <div class="cals exercise">+${Math.round(e.cals)}</div>
        <button class="delete-btn" onclick="deleteExercise(${i})">&times;</button>
      </div>
    `).join('');
  }

  // Measurements
  const m = day.measurements || {};
  const isImperial = settings.units === 'imperial';
  document.getElementById('mWeight').textContent = m.weight ? (isImperial ? (m.weight * 2.205).toFixed(1) : m.weight) : '--';

  // Update unit labels
  updateUnitLabels();
}

function updateUnitLabels() {
  const isImperial = settings.units === 'imperial';
  document.querySelectorAll('.m-unit')[0].textContent = isImperial ? 'lbs' : 'kg';
  document.querySelectorAll('.m-unit')[1].textContent = isImperial ? 'in' : 'cm';
  document.querySelectorAll('.m-unit')[2].textContent = isImperial ? 'in' : 'cm';

  document.getElementById('weightLabel').textContent = isImperial ? 'Weight (lbs)' : 'Weight (kg)';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

  foodCalsPer100.value = '';
  updateCalPreview();

  if (q.length < 2) {
    searchResultsEl.classList.remove('show');
    return;
  }

  // Search custom foods, recipes, then built-in DB
  const customFoods = getCustomFoods();
  const recipes = getRecipes().map(r => ({ name: r.name + ' (recipe)', cal: r.calPer100 }));
  const allFoods = [...customFoods, ...recipes, ...FOOD_DB];
  const localResults = allFoods.filter(f => f.name.toLowerCase().includes(q)).slice(0, 5);
  showSearchResults(localResults, q);
});

function showSearchResults(localResults, query) {
  let html = '';

  // Always show online search at the top
  html += `<div class="search-item" onclick="searchOnline('${esc(query)}')" style="border-bottom:2px solid rgba(255,255,255,0.1)">
    <span class="s-name" style="color:var(--accent)">Search online for "${esc(query)}"</span>
    <span class="s-cal" style="color:var(--accent)">Open Food Facts</span>
  </div>`;

  if (localResults.length > 0) {
    html += localResults.map(f =>
      `<div class="search-item" onclick="selectFood('${esc(f.name)}', ${f.cal})">
        <span class="s-name">${esc(f.name)}</span>
        <span class="s-cal">${f.cal} kcal/100g</span>
      </div>`
    ).join('');
  }

  searchResultsEl.innerHTML = html;
  searchResultsEl.classList.add('show');
}

async function searchOnline(query) {
  searchResultsEl.innerHTML = '<div class="search-loading">Searching online...</div>';
  searchResultsEl.classList.add('show');

  try {
    const resp = await fetch(
      `https://world.openfoodfacts.org/api/v2/search?search_terms=${encodeURIComponent(query)}&page_size=15&fields=product_name,nutriments`,
      { headers: { 'User-Agent': 'CalorieTracker/1.0' } }
    );

    if (!resp.ok) {
      searchResultsEl.innerHTML = `<div class="search-loading">Search error (${resp.status}). Enter calories manually below.</div>`;
      return;
    }

    const data = await resp.json();

    if (!data.products || data.products.length === 0) {
      searchResultsEl.innerHTML = '<div class="search-loading">No results found. Enter calories manually below.</div>';
      return;
    }

    const results = data.products
      .filter(p => p.product_name && p.nutriments && (p.nutriments['energy-kcal_100g'] || p.nutriments['energy_100g']))
      .slice(0, 8);

    if (results.length === 0) {
      searchResultsEl.innerHTML = '<div class="search-loading">No calorie data found. Enter manually below.</div>';
      return;
    }

    searchResultsEl.innerHTML = results.map(p => {
      const name = p.product_name.substring(0, 50);
      let cal = p.nutriments['energy-kcal_100g'];
      if (!cal && p.nutriments['energy_100g']) cal = p.nutriments['energy_100g'] / 4.184;
      cal = Math.round(cal);
      return `<div class="search-item" onclick="selectFood('${esc(name)}', ${cal})">
        <span class="s-name">${esc(name)}</span>
        <span class="s-cal">${cal} kcal/100g</span>
      </div>`;
    }).join('');

  } catch (e) {
    searchResultsEl.innerHTML = '<div class="search-loading">Connection error. Check internet and try again, or enter calories manually below.</div>';
  }
}

function getWeightEntries() {
  const all = getData('days');
  const isImperial = settings.units === 'imperial';
  return Object.keys(all)
    .filter(k => all[k].measurements && all[k].measurements.weight)
    .sort()
    .map(k => ({
      date: k,
      weightKg: all[k].measurements.weight,
      weightDisplay: isImperial
        ? parseFloat((all[k].measurements.weight * 2.205).toFixed(1))
        : all[k].measurements.weight
    }));
}

function getSundayWeekKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun
  const sunday = new Date(d);
  sunday.setDate(d.getDate() - day);
  return dateKey(sunday);
}

function renderWeightLog() {
  const isImperial = settings.units === 'imperial';
  const unit = isImperial ? 'lbs' : 'kg';
  const list = document.getElementById('weightLogList');
  const entries = getWeightEntries();

  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">No weight logged yet</div>';
    return;
  }

  if (weightTab === 'daily') {
    const reversed = [...entries].reverse();
    list.innerHTML = reversed.map((e, i) => {
      const prev = reversed[i + 1];
      let diff = '';
      if (prev) {
        const change = (e.weightDisplay - prev.weightDisplay).toFixed(1);
        if (change > 0) diff = `<span style="color:var(--red)">+${change} ${unit}</span>`;
        else if (change < 0) diff = `<span style="color:var(--green)">${change} ${unit}</span>`;
        else diff = `<span style="color:var(--text2)">no change</span>`;
      }
      return `<div class="entry" style="margin-bottom:4px;">
        <div class="info">
          <div class="name">${e.date}</div>
          ${diff ? `<div class="detail">${diff}</div>` : ''}
        </div>
        <div style="font-size:16px;font-weight:700;">${e.weightDisplay} ${unit}</div>
      </div>`;
    }).join('');

  } else {
    // Group by week (Sun–Sat)
    const weeks = {};
    entries.forEach(e => {
      const wk = getSundayWeekKey(e.date);
      if (!weeks[wk]) weeks[wk] = [];
      weeks[wk].push(e);
    });

    const weekKeys = Object.keys(weeks).sort().reverse();
    list.innerHTML = weekKeys.map((wk, i) => {
      const days = weeks[wk];
      const avg = days.reduce((s, e) => s + e.weightDisplay, 0) / days.length;

      // End of week = Saturday
      const sun = new Date(wk + 'T00:00:00');
      const sat = new Date(sun);
      sat.setDate(sun.getDate() + 6);
      const label = `${wk} – ${dateKey(sat)}`;

      const prevWk = weekKeys[i + 1];
      let diff = '';
      if (prevWk) {
        const prevDays = weeks[prevWk];
        const prevAvg = prevDays.reduce((s, e) => s + e.weightDisplay, 0) / prevDays.length;
        const change = (avg - prevAvg).toFixed(1);
        if (change > 0) diff = `<span style="color:var(--red)">+${change} ${unit} vs prev week</span>`;
        else if (change < 0) diff = `<span style="color:var(--green)">${change} ${unit} vs prev week</span>`;
        else diff = `<span style="color:var(--text2)">same as prev week</span>`;
      }

      return `<div class="entry" style="margin-bottom:4px;flex-direction:column;align-items:flex-start;gap:4px;">
        <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div class="name" style="font-size:13px;">${label}</div>
            <div class="detail">${days.length} day${days.length > 1 ? 's' : ''} logged</div>
          </div>
          <div style="font-size:18px;font-weight:700;">${avg.toFixed(1)} ${unit}</div>
        </div>
        ${diff ? `<div style="font-size:12px;">${diff}</div>` : ''}
      </div>`;
    }).join('');
  }
}

async function syncToCloud() {

      method: 'PATCH',
      headers: {

async function loadFromCloud() {
  try {
    const resp = await fetch(`${SUPA_URL}/rest/v1/user_data?id=eq.main&select=data`, {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`
      }
    });
    const rows = await resp.json();
    if (rows && rows[0] && rows[0].data && Object.keys(rows[0].data).length > 0) {
      const cloud = rows[0].data;
      const local = getAllLocalData();

      // Merge: use whichever has more day entries (more data = more recent use)
      const cloudDays = Object.keys(cloud.days || {}).length;
      const localDays = Object.keys(local.days || {}).length;

      if (cloudDays > localDays) {
        // Cloud has more data, use cloud but merge in any local-only days
        const merged = { ...cloud.days, ...local.days };
        cloud.days = merged;
        applyCloudData(cloud);
        settings = JSON.parse(localStorage.getItem('ct_settings') || '{"goal":2000,"units":"metric"}');
        render();
      } else if (localDays > 0) {
        // Local has more or equal data, push to cloud
        syncToCloud();
      }
    } else if (Object.keys(getData('days')).length > 0) {
      // Cloud is empty, push local data up
      syncToCloud();
    }
  } catch (e) { /* offline, skip */ }
}

};

const origSetItem = localStorage.setItem.bind(localStorage);
const syncKeys = ['ct_settings', 'ct_customFoods', 'ct_recipes'];
localStorage.setItem = function(key, val) {
  origSetItem(key, val);
  if (syncKeys.includes(key)) syncToCloud();
};

// ── Init ──
updateDateLabel();
render();
loadFromCloud();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
